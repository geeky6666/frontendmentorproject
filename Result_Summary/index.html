<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" sizes="32x32" href="./image/favicon-32x32.png">

  <link rel="stylesheet" href="style.css">
  
  <title>Results summary component</title>

  <style>
    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>
<div class="card">
  <div class="result">
    <h2 style="color: white">Your Result</h2>
    <div class="score">
    <h1 style="color: white">76</h1>
    <p>of 100</p>
    </div>
    <h3 class="p">Great</h3>
    <p class="pa">You scored higher than 65% of the people who have taken these tests.</p>
  </div>
  <div class="summary-list">
    <h2 style="margin-bottom: 1rem;">Summary</h2>
    <div class="item">
      <span><img src="./image/icon-reaction.svg" alt=""> Reaction</span>
      <span>80/100</span>
    </div>
    <div class="item">
      <span><img src="./image/icon-memory.svg" alt=""> Memory</span>
      <span>92/100</span>
    </div>
    <div class="item">
      <span><img src="./image/icon-verbal.svg" alt=""> Verbal</span>
      <span>61/100</span>
    </div>
    <div class="item">
      <span><img src="./image/icon-visual.svg" alt=""> Visual</span>
      <span>72/100</span>
    </div>
    <button>Continue</button>

  </div>
</div>
</body>
</html>
